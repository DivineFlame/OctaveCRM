[variables]
NODE_VERSION = "20.19.0"
NPM_CONFIG_PRODUCTION = "false"
PORT = "3002"
HOSTNAME = "0.0.0.0"

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx prisma db push && npm run seed && next start -H 0.0.0.0 -p ${PORT:-3002}"
