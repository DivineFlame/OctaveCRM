services:
  app:
    build: .
    container_name: octavecrm-app
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://octavecrm:octavecrm@postgres:5432/octavecrm
      REDIS_URL: redis://redis:6379
      PORT: 3003
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://38.247.188.228:3003}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      PAPERCLIP_ENDPOINT: ${PAPERCLIP_ENDPOINT:-http://paperclip:3100}
      LOCAL_LLM_ENDPOINT: ${LOCAL_LLM_ENDPOINT:-http://ollama:11434}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
      - paperclip
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: octavecrm-postgres
    environment:
      POSTGRES_USER: octavecrm
      POSTGRES_PASSWORD: octavecrm
      POSTGRES_DB: octavecrm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: octavecrm-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: octave-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: octave-open-webui
    restart: unless-stopped
    ports:
      - "3001:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "true"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama

  hermes-agent:
    build:
      context: https://github.com/NousResearch/hermes-agent.git#main
    image: octave-hermes-agent:local
    container_name: octave-hermes-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:8642:8642"
    environment:
      HERMES_UID: 10000
      HERMES_GID: 10000
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_KEY:?Set HERMES_API_KEY in .env to a strong secret of at least 16 characters}
      API_SERVER_MODEL_NAME: hermes-agent
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - hermes-data:/opt/data
    command: ["gateway", "run"]
    depends_on:
      - ollama

  paperclip:
    build:
      context: https://github.com/paperclipai/paperclip.git#master
    image: octave-paperclip:local
    container_name: octave-paperclip
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3100
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_TELEMETRY_DISABLED: "1"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      - ollama

volumes:
  postgres-data:
  ollama-data:
  open-webui-data:
  hermes-data:
  paperclip-data:
